{% extends "base.html" %}
{% block content %}
<h2>Admin Panel</h2>
<table>
    <tr><th>ID</th><th>Username</th><th>API Key</th><th>Admin</th><th>Actions</th></tr>
    {% for u in users %}
    <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.username }}</td>
        <td><code>{{ u.api_key or 'N/A' }}</code></td>
        <td>{{ 'Yes' if u.is_admin else 'No' }}</td>
        <td>
            <form method="POST" action="{{ url_for('generate_api', user_id=u.id) }}" style="display:inline">
                <button type="submit">Regenerate API</button>
            </form>
            {% if u.id != session.user_id %}
            <form method="POST" action="{{ url_for('delete_user', user_id=u.id) }}" style="display:inline" onsubmit="return confirm('Delete user?')">
                <button type="submit" style="background:red;">Delete</button>
            </form>
            {% endif %}
        </td>
    </tr>
    {% endfor %}
</table>
<p><a href="{{ url_for('checker') }}">Back to Checker</a></p>
{% endblock %}
